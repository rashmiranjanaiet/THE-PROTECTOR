services:
  - type: web
    name: the-protector
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: HF_CHAT_MODEL
        value: meta-llama/Llama-3.1-8B-Instruct
      - key: AIRLABS_API_KEY
        sync: false
      - key: AIRLABS_API_URL
        value: https://airlabs.co/api/v9/flights
      - key: FLIGHT_API_KEY
        sync: false
      - key: FLIGHT_API_URL
        value: https://api.aviationstack.com/v1/flights
      - key: ISRO_API_KEY
        sync: false
      - key: ISRO_API_URL
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: NEWSDATA_API_KEY
        sync: false
      - key: LIVE_WAR_URL
        value: https://liveuamap.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SECURE_MESSAGE_TTL_HOURS
        value: 72
      - key: MAX_UPLOAD_MB
        value: 5
